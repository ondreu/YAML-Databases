name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must match manifest.json version, e.g. 0.2.1)"
        required: true
        default: "0.2.1"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tag comes from the pushed tag ref, or the workflow_dispatch input.
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          fi

          # Mark semver pre-release tags (those containing a hyphen, e.g.
          # 0.1.0-beta.1) as GitHub pre-releases; plain x.y.z tags are stable.
          prerelease=""
          case "$tag" in
            *-*) prerelease="--prerelease" ;;
          esac

          # When dispatched manually the tag does not exist yet; gh creates it
          # on the current commit via --target.
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title="$tag" \
            --generate-notes \
            $prerelease \
            main.js manifest.json styles.css
