name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Mark semver pre-release tags (those containing a hyphen, e.g.
          # 0.1.0-beta.1) as GitHub pre-releases; plain x.y.z tags are stable.
          prerelease=""
          case "$tag" in
            *-*) prerelease="--prerelease" ;;
          esac
          gh release create "$tag" \
            --title="$tag" \
            --generate-notes \
            $prerelease \
            main.js manifest.json styles.css
